# Production compose for the shared Lightsail host (bruhnfreeman-com).
#
# The host runs a containerized Caddy reverse proxy on the external Docker
# network `web`. Every app container joins `web`, and Caddy proxies to it by
# container name (e.g. `reverse_proxy bennetlegal-web:3000`). We therefore do
# NOT publish any host ports here — traffic only reaches the app through Caddy
# (which terminates TLS). This mirrors the existing apps on the box
# (naturalbliss-web, merlin-web, bruhnfreeman).
#
# Usage on the server:
#   docker compose up -d --build
#   # then add a site block to /srv/proxy/Caddyfile and reload Caddy.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bennetlegal-web:latest
    container_name: bennetlegal-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  # The shared proxy network created by the host's Caddy stack.
  web:
    external: true
